<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>셀러허브</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="셀러허브">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  header.top{background:var(--navy); color:#fff; padding: calc(22px + env(safe-area-inset-top)) 20px 26px;
    border-radius: 0 0 26px 26px; position:relative; overflow:hidden;}
  header.top::before{content:""; position:absolute; inset:0; opacity:0.5;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 16px 16px; mask-image: linear-gradient(to bottom, black, transparent 85%);}
  header.top::after{content:""; position:absolute; right:-50px; top:-60px; width:200px; height:200px;
    background: radial-gradient(circle, rgba(232,163,61,0.3), transparent 70%);}
  .brand{position:relative; display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:0.12em; color:var(--amber); font-weight:700;}
  .brand .dot{width:6px; height:6px; border-radius:50%; background:var(--amber); box-shadow:0 0 0 4px rgba(232,163,61,0.18);}
  h1.page-title{position:relative; margin:8px 0 20px; font-size:25px; font-weight:800; letter-spacing:-0.01em;}

  .period-tabs{position:relative; display:flex; gap:4px; background:rgba(255,255,255,0.07); padding:4px; border-radius:999px; width:fit-content;}
  .period-tabs button{border:0; background:transparent; color:rgba(255,255,255,0.6); font-size:13px; font-weight:600;
    padding:7px 15px; border-radius:999px; cursor:pointer; font-family:inherit; transition:background .15s;}
  .period-tabs button.active{background:var(--amber); color:var(--navy); box-shadow:0 2px 8px rgba(232,163,61,0.4);}

  .hero-card{background:var(--surface); border-radius:18px; padding:22px 20px; box-shadow: 0 4px 18px rgba(15,27,46,0.06);
    border:1px solid var(--line); margin-bottom:16px; position:relative;}
  .hero-top{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px;}
  .hero-label{font-size:12.5px; color:var(--ink-mute); font-weight:600; display:flex; align-items:center; gap:6px;}
  .hero-label-icon{width:26px; height:26px; border-radius:8px; background:var(--amber-soft); color:#8a5c14;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .hero-amount{font-size:36px; font-weight:800; letter-spacing:-0.03em; line-height:1;}
  .hero-amount .unit{font-size:15px; font-weight:700; color:var(--ink-mute); margin-left:3px;}
  .hero-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; padding-top:16px; border-top:1px dashed var(--line);}
  .hero-stat-label{font-size:11.5px; color:var(--ink-mute); margin-bottom:3px;}
  .hero-stat-value{font-size:16px; font-weight:700;}

  .section-title{font-size:14.5px; font-weight:800; margin: 22px 2px 12px; display:flex; justify-content:space-between; align-items:center;}
  .section-title span.mute{font-size:12px; color:var(--ink-mute); font-weight:500;}

  .cat-row{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 16px 15px;
    margin-bottom:8px;}
  .cat-row-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;}
  .cat-rank{display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:6px;
    background:var(--bg); color:var(--ink-mute); font-size:10.5px; font-weight:800; margin-right:8px; flex-shrink:0;}
  .cat-name{font-size:14px; font-weight:700; display:flex; align-items:center;}
  .cat-count{font-size:11.5px; color:var(--ink-mute); margin-top:2px; margin-left:28px;}
  .cat-amount{font-size:15px; font-weight:800;}
  .cat-bar-track{height:7px; border-radius:999px; background:var(--bg); overflow:hidden;}
  .cat-bar-fill{height:100%; border-radius:999px; background:linear-gradient(90deg, var(--amber), #F0BC6A);}

  .pipeline-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px 18px 16px; margin-bottom:16px;}
  .pipeline-title{font-size:13px; font-weight:800; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center;}
  .pipeline-title a{font-size:12px; color:var(--ink-mute); font-weight:600; text-decoration:none;}
  .pipeline-row{display:flex; align-items:center; gap:12px; padding:9px 0; position:relative;}
  .pipeline-row:not(:last-child)::after{content:""; position:absolute; left:5px; top:28px; bottom:-9px; width:1.5px; background:var(--line);}
  .pipeline-dot{width:11px; height:11px; border-radius:50%; background:var(--line); flex-shrink:0; position:relative; z-index:1;}
  .pipeline-row.has-count .pipeline-dot{background:var(--amber);}
  .pipeline-row.warn .pipeline-dot{background:var(--danger);}
  .pipeline-label{flex:1; font-size:13.5px; font-weight:600; color:var(--ink-mute);}
  .pipeline-row.has-count .pipeline-label{color:var(--ink);}
  .pipeline-row.warn .pipeline-label{color:var(--danger);}
  .pipeline-count{font-size:15px; font-weight:800;}
  .pipeline-row.warn .pipeline-count{color:var(--danger);}

  .trend-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px;}
  .trend-title{font-size:13px; font-weight:800; margin-bottom:14px;}
  .trend-chart{display:flex; align-items:flex-end; gap:5px; height:90px;}
  .trend-bar-wrap{flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; gap:5px;}
  .trend-bar{width:100%; max-width:22px; border-radius:5px 5px 2px 2px; background:var(--bg); position:relative; min-height:3px;}
  .trend-bar.has-value{background:linear-gradient(180deg, var(--amber), #F0BC6A);}
  .trend-bar.today{background:linear-gradient(180deg, var(--navy), var(--navy-soft));}
  .trend-day{font-size:9.5px; color:var(--ink-mute); margin-top:2px;}


  .refresh-btn{position:fixed; right:calc(16px + max(0px, (100vw - 520px)/2)); bottom:calc(88px + env(safe-area-inset-bottom));
    width:46px; height:46px; border-radius:50%; background:var(--navy); color:#fff; border:0; box-shadow:0 4px 14px rgba(15,27,46,0.3);
    display:flex; align-items:center; justify-content:center; font-size:18px; z-index:55;}
  .refresh-btn.spinning svg{animation: spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .todo-card{background:linear-gradient(135deg, #FFF6E8, #FFFFFF); border:1px solid var(--amber-soft); border-radius:14px;
    padding:16px; margin-bottom:14px; display:flex; align-items:center; gap:12px; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .todo-card:active{transform:scale(0.99);}
  .todo-icon{width:40px; height:40px; border-radius:10px; background:var(--amber); color:#fff; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;}
  .todo-text{flex:1;}
  .todo-title{font-size:13px; color:var(--ink-mute); margin-bottom:2px;}
  .todo-count{font-size:16px; font-weight:700;}
  .todo-count b{color:var(--coupang); font-size:19px;}
  .todo-arrow{color:var(--ink-mute); flex-shrink:0;}
  .todo-card.done{background:var(--surface); border-color:var(--line);}
  .todo-card.done .todo-icon{background:var(--success);}

  @media (min-width: 900px) {
    main{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;}
    .todo-card{grid-column:1/-1; margin-bottom:0;}
    .trend-card{grid-column:1/-1; margin-bottom:0;}
    .section-title{grid-column:1/-1; margin-top:4px;}
    #catList{grid-column:1/-1; display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:8px;}
    #catList .cat-row{margin-bottom:0;}
    .hero-card{margin-bottom:0;}
    .pipeline-card{margin-bottom:0;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand"><span class="dot"></span>SELLER HUB</div>
    <h1 class="page-title">오늘의 집계</h1>
    <div class="period-tabs" id="periodTabs">
      <button data-period="day" class="active">오늘</button>
      <button data-period="week">이번 주</button>
      <button data-period="month">이번 달</button>
    </div>
  </header>

  <main>
    <div class="todo-card" id="todoCard" style="display:none;">
      <div class="todo-icon" id="todoIcon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
      </div>
      <div class="todo-text">
        <div class="todo-title" id="todoTitle">지금 처리할 일</div>
        <div class="todo-count" id="todoCount">확인 중...</div>
      </div>
      <div class="todo-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-top">
        <div class="hero-label">
          <span class="hero-label-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </span>
          <span id="heroLabel">오늘 매출</span>
        </div>
      </div>
      <div class="hero-amount mono" id="heroAmount">0<span class="unit">원</span></div>
      <div class="hero-grid">
        <div>
          <div class="hero-stat-label">주문 건수</div>
          <div class="hero-stat-value mono" id="heroCount">0건</div>
        </div>
        <div>
          <div class="hero-stat-label">평균 주문가</div>
          <div class="hero-stat-value mono" id="heroAvg">0원</div>
        </div>
      </div>
    </div>

    <div class="pipeline-card">
      <div class="pipeline-title">
        <span>주문 처리 현황</span>
        <a href="orders.html">전체보기 →</a>
      </div>
      <div id="pipelineBody">
        <div class="skeleton" style="height:18px; margin-bottom:16px;"></div>
        <div class="skeleton" style="height:18px; margin-bottom:16px;"></div>
        <div class="skeleton" style="height:18px;"></div>
      </div>
    </div>

    <div class="trend-card">
      <div class="trend-title">최근 14일 주문 추이</div>
      <div class="trend-chart" id="trendChart"></div>
    </div>

    <div class="section-title">카테고리별 집계 <span class="mute" id="catMeta"></span></div>
    <div id="catList"></div>
  </main>

  <button class="refresh-btn" id="refreshBtn" aria-label="새로고침">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
    </svg>
  </button>

  <div class="toast" id="toast"></div>

  <nav class="bottom">
    <div class="bottom-inner">
      <a href="index.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a href="orders.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
        주문
      </a>
      <a href="inventory.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>
        재고
      </a>
      <a href="insights.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        종합
      </a>
      <a href="settlement.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 17h.01M12 17h.01"/></svg>
        정산
      </a>
      <a href="profile.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>
        내정보
      </a>
    </div>
  </nav>

</div>

<script src="common.js"></script>
<script>
  const periodLabels = { day: '오늘 매출', week: '이번 주 매출', month: '이번 달 매출' };
  let currentPeriod = 'day';

  async function loadSummary(period) {
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');
    try {
      const data = await callApi('getSummary', { period });
      if (data.error) throw new Error(data.error);

      document.getElementById('heroLabel').textContent = periodLabels[period];
      document.getElementById('heroAmount').innerHTML = formatWon(data.total.amount) + '<span class="unit">원</span>';
      document.getElementById('heroCount').textContent = formatWon(data.total.count) + '건';
      const avg = data.total.count > 0 ? Math.round(data.total.amount / data.total.count) : 0;
      document.getElementById('heroAvg').textContent = formatWon(avg) + '원';

      const catListEl = document.getElementById('catList');
      const categories = Object.keys(data.byCategory || {});
      document.getElementById('catMeta').textContent = categories.length ? categories.length + '개 카테고리' : '';

      if (!categories.length) {
        catListEl.innerHTML = `<div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>
          <b>아직 집계된 주문이 없어요</b>주문이 들어오면 카테고리별로 자동으로 정리돼요
        </div>`;
      } else {
        const sorted = categories
          .map(cat => ({ cat, ...data.byCategory[cat] }))
          .sort((a, b) => b.amount - a.amount);
        const maxAmount = Math.max(...sorted.map(c => c.amount), 1);

        catListEl.innerHTML = sorted.map((c, i) => {
          const pct = Math.max(4, Math.round((c.amount / maxAmount) * 100));
          return `<div class="cat-row">
            <div class="cat-row-top">
              <div>
                <div class="cat-name"><span class="cat-rank">${i + 1}</span>${c.cat}</div>
                <div class="cat-count mono">${formatWon(c.count)}건</div>
              </div>
              <div class="cat-amount mono">${formatWon(c.amount)}원</div>
            </div>
            <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('');
      }
    } catch (e) {
      showToast('불러오기 실패: ' + e.message);
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  document.getElementById('periodTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-period]');
    if (!btn) return;
    document.querySelectorAll('#periodTabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    loadSummary(currentPeriod);
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadSummary(currentPeriod));

  function renderTodo(orders) {
    const card = document.getElementById('todoCard');
    const icon = document.getElementById('todoIcon');
    const title = document.getElementById('todoTitle');
    const countEl = document.getElementById('todoCount');

    const n = orders.filter(o => (o['주문상태'] || '신규') === '신규').length;
    card.style.display = 'flex';

    if (n > 0) {
      card.classList.remove('done');
      title.textContent = '송장 출력 대기 중';
      countEl.innerHTML = '<b>' + n + '건</b>의 주문이 발송 처리를 기다리고 있어요';
      card.onclick = () => { window.location.href = 'orders.html?status=신규'; };
    } else {
      card.classList.add('done');
      icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>';
      title.textContent = '처리할 일 없음';
      countEl.textContent = '신규 주문이 모두 처리됐어요';
      card.onclick = () => { window.location.href = 'orders.html'; };
    }
  }

  function renderPipeline(orders) {
    const body = document.getElementById('pipelineBody');
    const counts = { '신규': 0, '보류': 0, '송장출력완료': 0, '발송완료': 0, '반품접수': 0, '반품완료': 0, '취소': 0 };
    orders.forEach(o => {
      const s = o['주문상태'] || '신규';
      if (counts[s] !== undefined) counts[s]++;
    });
    const unsentCount = orders.filter(o => o['채널전송상태'] === '실패').length;

    const rows = [
      { key: '신규', label: '송장출력 대기', warn: false },
      { key: '보류', label: '보류', warn: true },
      { key: '송장출력완료', label: '전송 대기', warn: false },
      { key: '발송완료', label: '발송완료', warn: false },
      { key: '반품접수', label: '반품접수', warn: true },
      { key: '반품완료', label: '반품완료(재입고)', warn: false },
      { key: '취소', label: '취소', warn: true }
    ];

    body.innerHTML = rows.map(r => {
      const n = counts[r.key];
      const cls = 'pipeline-row' + (n > 0 ? (r.warn ? ' warn' : ' has-count') : '');
      return `<div class="${cls}">
        <span class="pipeline-dot"></span>
        <span class="pipeline-label">${r.label}</span>
        <span class="pipeline-count mono">${formatWon(n)}건</span>
      </div>`;
    }).join('') + `<div class="pipeline-row${unsentCount > 0 ? ' warn' : ''}">
      <span class="pipeline-dot"></span>
      <span class="pipeline-label">송장번호 미전송</span>
      <span class="pipeline-count mono">${formatWon(unsentCount)}건</span>
    </div>`;
  }

  function renderTrend(trend) {
    const chartEl = document.getElementById('trendChart');
    const maxCount = Math.max(...trend.map(t => t.count), 1);
    const todayKey = new Date().toISOString().slice(0, 10);

    chartEl.innerHTML = trend.map(t => {
      const heightPct = Math.max(4, Math.round((t.count / maxCount) * 100));
      const isToday = t.date === todayKey;
      const dayLabel = Number(t.date.slice(8, 10));
      return `<div class="trend-bar-wrap" title="${t.date}: ${t.count}건">
        <div class="trend-bar ${t.count > 0 ? (isToday ? 'today' : 'has-value') : ''}" style="height:${heightPct}%"></div>
        <div class="trend-day">${dayLabel}</div>
      </div>`;
    }).join('');
  }

  // 처리할일/처리현황/추이차트를 API 1번으로 한번에 불러옴 (왕복 줄여서 속도 개선)
  async function loadDashboardExtras() {
    try {
      const data = await callApi('getDashboardExtras', {});
      if (data.error) throw new Error(data.error);
      renderTodo(data.orders);
      renderPipeline(data.orders);
      renderTrend(data.trend);
    } catch (e) {
      document.getElementById('todoCard').style.display = 'none';
      document.getElementById('pipelineBody').innerHTML =
        '<div style="font-size:12px; color:var(--ink-mute); text-align:center; padding:8px 0;">불러오지 못했어요</div>';
      document.getElementById('trendChart').innerHTML =
        '<div style="font-size:12px; color:var(--ink-mute); text-align:center; width:100%;">불러오지 못했어요</div>';
    }
  }
  loadDashboardExtras();

  document.querySelectorAll('[data-soon]').forEach(el => {
    el.addEventListener('click', () => showToast('다음 단계에서 만들 예정이에요'));
  });

  loadSummary(currentPeriod);
</script>
</body>
</html>
