<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>내정보 - 셀러허브</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .staff-card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 16px;
    margin-bottom:9px; display:flex; align-items:center; gap:12px;}
  .staff-avatar{width:38px; height:38px; border-radius:50%; background:var(--navy); color:var(--amber);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex-shrink:0;}
  .staff-name{font-size:14.5px; font-weight:700;}
  .staff-role{font-size:12px; color:var(--ink-mute); margin-top:2px;}

  .add-staff-card{background:var(--surface); border:1px dashed var(--line); border-radius:14px; padding:14px 16px;
    margin-bottom:16px; display:flex; align-items:center; gap:10px; cursor:pointer; color:var(--ink-mute); font-size:13.5px; font-weight:600;}
  .add-staff-card svg{color:var(--amber); flex-shrink:0;}

  .app-info{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-top:20px;}
  .app-info-row{display:flex; justify-content:space-between; padding:8px 0; font-size:13px;}
  .app-info-row span:first-child{color:var(--ink-mute);}
  .app-info-row span:last-child{font-weight:600;}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand"><span class="dot"></span>SELLER HUB</div>
    <h1 class="page-title">내정보</h1>
  </header>

  <main>
    <div class="section-title" style="margin-top:4px;">담당자 관리</div>
    <div class="add-staff-card" id="addStaffCard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      새 담당자 등록
    </div>
    <div id="staffList"><div class="skeleton" style="height:60px; margin-bottom:9px;"></div></div>

    <div class="app-info">
      <div class="app-info-row"><span>연동 저장소</span><span>enochsofficial2/sellerhub</span></div>
      <div class="app-info-row"><span>버전</span><span>v1</span></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <nav class="bottom">
    <div class="bottom-inner">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a href="orders.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
        주문
      </a>
      <a href="inventory.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>
        재고
      </a>
      <a href="profile.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>
        내정보
      </a>
    </div>
  </nav>

</div>

<div class="sheet-overlay" id="staffOverlay"></div>
<div class="sheet" id="staffSheet">
  <div class="sheet-handle"></div>
  <h2>새 담당자 등록</h2>
  <div class="sheet-sub">등록하면 주문/재고 처리 시 담당자로 선택할 수 있어요</div>
  <div class="field"><label>이름 *</label><input type="text" id="staffName" placeholder="이름 입력"></div>
  <div class="field">
    <label>역할</label>
    <select id="staffRole">
      <option>대표</option><option>직원</option><option>알바</option><option>기타</option>
    </select>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="staffCancel">취소</button>
    <button class="btn btn-primary" id="staffSubmit">등록</button>
  </div>
</div>

<script src="common.js"></script>
<script>
  function openSheet(o, s) { document.getElementById(o).classList.add('show'); document.getElementById(s).classList.add('show'); }
  function closeSheet(o, s) { document.getElementById(o).classList.remove('show'); document.getElementById(s).classList.remove('show'); }

  async function loadStaff() {
    const listEl = document.getElementById('staffList');
    try {
      const staff = await callApi('listStaff', {});
      if (staff.error) throw new Error(staff.error);

      if (!staff.length) {
        listEl.innerHTML = `<div class="empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>
          <b>등록된 담당자가 없어요</b>위 버튼으로 첫 담당자를 등록해보세요
        </div>`;
        return;
      }

      listEl.innerHTML = staff.map(s => `<div class="staff-card">
        <div class="staff-avatar">${(s['이름'] || '?').charAt(0)}</div>
        <div>
          <div class="staff-name">${s['이름']}</div>
          <div class="staff-role">${s['역할'] || '직원'}</div>
        </div>
      </div>`).join('');
    } catch (e) {
      showToast('불러오기 실패: ' + e.message);
    }
  }

  document.getElementById('addStaffCard').addEventListener('click', () => openSheet('staffOverlay', 'staffSheet'));
  document.getElementById('staffCancel').addEventListener('click', () => closeSheet('staffOverlay', 'staffSheet'));
  document.getElementById('staffOverlay').addEventListener('click', () => closeSheet('staffOverlay', 'staffSheet'));

  document.getElementById('staffSubmit').addEventListener('click', async () => {
    const name = document.getElementById('staffName').value.trim();
    if (!name) { showToast('이름을 입력해주세요'); return; }
    const btn = document.getElementById('staffSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('addStaff', { name, role: document.getElementById('staffRole').value });
      if (res.error) throw new Error(res.error);
      showToast('담당자가 등록됐어요');
      closeSheet('staffOverlay', 'staffSheet');
      document.getElementById('staffName').value = '';
      loadStaff();
    } catch (e) {
      showToast('등록 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  loadStaff();
</script>
</body>
</html>
