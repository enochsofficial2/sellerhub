<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>내정보 - 셀러허브</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .edit-info-card{background:var(--surface); border:1px dashed var(--line); border-radius:14px; padding:14px 16px;
    margin-top:8px; display:flex; align-items:center; gap:10px; cursor:pointer; color:var(--ink-mute); font-size:13.5px; font-weight:600;}
  .edit-info-card svg{color:var(--amber); flex-shrink:0;}

  .app-info{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-top:20px;}
  .app-info-row{display:flex; justify-content:space-between; padding:8px 0; font-size:13px;}
  .app-info-row span:first-child{color:var(--ink-mute);}
  .app-info-row span:last-child{font-weight:600;}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand"><span class="dot"></span>SELLER HUB</div>
    <h1 class="page-title">내정보</h1>
  </header>

  <main>
    <div class="section-title" style="margin-top:4px;">출고지 정보 (송장 출력에 사용)</div>
    <div class="app-info" id="storeInfoView" style="margin-top:0;">
      <div class="app-info-row"><span>보내는사람</span><span id="viewStoreName">미설정</span></div>
      <div class="app-info-row"><span>연락처</span><span id="viewStorePhone">-</span></div>
      <div class="app-info-row"><span>주소</span><span id="viewStoreAddress">-</span></div>
    </div>
    <div class="edit-info-card" id="editStoreBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      출고지 정보 수정
    </div>

    <div class="app-info">
      <div class="app-info-row"><span>연동 저장소</span><span>enochsofficial2/sellerhub</span></div>
      <div class="app-info-row"><span>버전</span><span>v1</span></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <nav class="bottom">
    <div class="bottom-inner">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a href="orders.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
        주문
      </a>
      <a href="inventory.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>
        재고
      </a>
      <a href="insights.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        종합
      </a>
      <a href="profile.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>
        내정보
      </a>
    </div>
  </nav>

</div>

<div class="sheet-overlay" id="storeOverlay"></div>
<div class="sheet" id="storeSheet">
  <div class="sheet-handle"></div>
  <h2>출고지 정보 수정</h2>
  <div class="sheet-sub">송장 출력 시 "보내는사람"으로 표시돼요</div>
  <div class="field"><label>보내는사람(상호/이름)</label><input type="text" id="storeName" placeholder="예: 셀러허브 스토어"></div>
  <div class="field"><label>연락처</label><input type="text" id="storePhone" placeholder="예: 010-1234-5678"></div>
  <div class="field"><label>주소</label><input type="text" id="storeAddress" placeholder="출고지 주소"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="storeCancel">취소</button>
    <button class="btn btn-primary" id="storeSubmit">저장</button>
  </div>
</div>

<script src="common.js"></script>
<script>
  function openSheet(o, s) { document.getElementById(o).classList.add('show'); document.getElementById(s).classList.add('show'); }
  function closeSheet(o, s) { document.getElementById(o).classList.remove('show'); document.getElementById(s).classList.remove('show'); }

  async function loadStoreInfo() {
    try {
      const info = await callApi('getStoreInfo', {});
      if (info.error) return;
      document.getElementById('viewStoreName').textContent = info.name || '미설정';
      document.getElementById('viewStorePhone').textContent = info.phone || '-';
      document.getElementById('viewStoreAddress').textContent = info.address || '-';
      document.getElementById('storeName').value = info.name || '';
      document.getElementById('storePhone').value = info.phone || '';
      document.getElementById('storeAddress').value = info.address || '';
    } catch (e) {}
  }

  document.getElementById('editStoreBtn').addEventListener('click', () => openSheet('storeOverlay', 'storeSheet'));
  document.getElementById('storeCancel').addEventListener('click', () => closeSheet('storeOverlay', 'storeSheet'));
  document.getElementById('storeOverlay').addEventListener('click', () => closeSheet('storeOverlay', 'storeSheet'));

  document.getElementById('storeSubmit').addEventListener('click', async () => {
    const btn = document.getElementById('storeSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('saveStoreInfo', {
        name: document.getElementById('storeName').value.trim(),
        phone: document.getElementById('storePhone').value.trim(),
        address: document.getElementById('storeAddress').value.trim()
      });
      if (res.error) throw new Error(res.error);
      showToast('출고지 정보가 저장됐어요');
      closeSheet('storeOverlay', 'storeSheet');
      loadStoreInfo();
    } catch (e) {
      showToast('저장 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  loadStoreInfo();
</script>
</body>
</html>
