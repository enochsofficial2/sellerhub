<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송장 출력 - 셀러허브</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  :root{ --ink:#111; --line:#000; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Pretendard', sans-serif; background:#EEF1F5; color:var(--ink); padding:16px; font-size:12px;}
  .toolbar{max-width:460px; margin:0 auto 14px; display:flex; gap:8px;}
  .toolbar button{flex:1; border:0; border-radius:10px; padding:12px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;}
  .btn-print{background:#0F1B2E; color:#fff;}
  .btn-back{background:#fff; color:var(--ink); border:1px solid #DCE1E9 !important;}
  body.embedded .toolbar{display:none;}
  .batch-note{max-width:460px; margin:0 auto 14px; font-size:12px; color:#5C6478; text-align:center;}

  /* ===== CJ대한통운 표준 운송장 레이아웃 ===== */
  .label{max-width:460px; margin:0 auto 14px; background:#fff; border:2px solid var(--line); font-size:11.5px;}
  .l-row{display:flex; border-bottom:1px solid var(--line);}
  .l-row:last-child{border-bottom:0;}

  .l-head{justify-content:space-between; align-items:center; padding:5px 10px; font-size:10.5px;}
  .l-head .no-label{color:#555; margin-right:6px;}
  .l-head .no-value{font-weight:800; font-size:13px; letter-spacing:0.5px;}
  .l-head .date{color:#555;}

  .l-barcode{padding:8px 10px; align-items:center; gap:10px;}
  .l-barcode svg{flex:1; height:44px; max-width:65%;}
  .l-terminal{font-size:26px; font-weight:800; letter-spacing:-0.5px; text-align:right; flex-shrink:0; min-width:80px;}

  .l-to{padding:8px 10px; gap:8px; align-items:flex-start;}
  .l-tag{writing-mode:vertical-rl; font-size:10.5px; font-weight:700; background:#e9ecef; padding:4px 3px; border-radius:2px; flex-shrink:0;}
  .l-to-main{flex:1;}
  .l-to-name{font-size:15px; font-weight:800;}
  .l-to-sub{font-size:11px; color:#333; margin-top:2px;}
  .l-to-addr{font-size:11.5px; color:#111; margin-top:3px; line-height:1.4;}
  .l-to-barcode{flex-shrink:0;}
  .l-to-barcode svg{height:30px; width:90px;}

  .l-from{padding:7px 10px; flex-direction:column; gap:2px;}
  .l-from-top{display:flex; justify-content:space-between; align-items:center;}
  .l-from-name{font-weight:700;}
  .l-from-phone{color:#333;}
  .l-tags{display:flex; gap:5px; align-items:center;}
  .l-chip{background:#dbe9ff; color:#1B5FAE; font-size:9.5px; font-weight:700; padding:1px 5px; border-radius:2px;}
  .l-from-addr{font-size:11px; color:#333; margin-top:3px;}
  .l-from-receiver-echo{font-size:10.5px; color:#555; margin-top:4px;}

  .l-product{padding:6px 10px; font-size:11.5px; font-weight:600;}

  .l-perf{position:relative; height:0; border-top:2px dashed #aaa; margin:2px 0;}
  .l-perf::before{content:"✂ 절취선"; position:absolute; left:50%; top:-8px; transform:translateX(-50%);
    background:#EEF1F5; font-size:9px; color:#888; padding:0 6px;}

  .l-stub{padding:8px 10px; align-items:center; gap:10px;}
  .l-stub-name{font-size:13px; font-weight:800; flex-shrink:0;}
  .l-stub-qty{font-size:10.5px; color:#555; flex-shrink:0;}
  .l-stub svg{flex:1; height:28px;}
  .l-stub-page{font-size:10px; color:#555; flex-shrink:0;}
  .l-stub2{padding:4px 10px 8px; justify-content:space-between; font-size:10px; color:#555;}
  .l-stub2 .num{font-family:'IBM Plex Mono', monospace; font-weight:700; color:#111; font-size:11px;}

  .temp-notice{background:#FFF6E5; color:#8a5c14; font-size:10px; font-weight:700; padding:5px 10px; text-align:center;}

  .loading, .error-box{max-width:460px; margin:40px auto; text-align:center; color:#5C6478; font-size:13px;}

  @media print {
    body{background:#fff; padding:0;}
    .toolbar, .batch-note{display:none;}
    .label{border:1.5px solid #000; page-break-inside:avoid;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn-back" onclick="window.close ? window.close() : history.back()">닫기</button>
  <button class="btn-print" onclick="window.print()">🖨 인쇄하기</button>
</div>

<div id="content" class="loading">불러오는 중...</div>

<script src="common.js"></script>
<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  if (getParam('embedded') === '1') {
    document.body.classList.add('embedded');
  }

  function maskPhone(phone) {
    if (!phone) return '-';
    const digits = phone.replace(/[^0-9]/g, '');
    if (digits.length < 8) return phone;
    return phone.slice(0, phone.length - 4) + '****';
  }

  function formatTrackingDisplay(trackingNo) {
    const s = String(trackingNo || '');
    if (s.length === 12) return s.slice(0,4) + '-' + s.slice(4,8) + '-' + s.slice(8,12);
    return s;
  }

  function renderLabel(order, store, idx) {
    const trackingNo = String(order['송장_송장번호'] || '');
    const isTemp = trackingNo.indexOf('999') === 0 || trackingNo.indexOf('998') === 0;
    const isFreshTemp = trackingNo.indexOf('998') === 0;
    const carrier = order['송장_택배사'] || '택배사 미지정';
    const barcodeId = 'barcode_' + idx;
    const barcodeIdSmall = 'barcode_small_' + idx;
    const barcodeIdStub = 'barcode_stub_' + idx;
    const dateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\. /g, '.').replace(/\.$/, '');

    let productLine = `${order['상품명'] || '-'} 외 ${order['수량'] || 0}개`;
    if (order['품목목록JSON']) {
      try {
        const items = JSON.parse(order['품목목록JSON']);
        if (items.length > 1) {
          productLine = items.map(it => `${it.productName} x${it.quantity}`).join(', ');
        }
      } catch (e) {}
    }

    return `
      ${isTemp ? `<div class="temp-notice">⚠ 임시 송장번호(${isFreshTemp ? '신선배송' : '일반배송'}) - 실제 접수 시 택배사 번호로 교체돼요</div>` : ''}
      <div class="label">
        <div class="l-row l-head">
          <div><span class="no-label">운송장번호</span><span class="no-value">${formatTrackingDisplay(trackingNo) || '-'}</span></div>
          <div class="date">${dateStr} · 1/1</div>
        </div>

        <div class="l-row l-barcode">
          <svg id="${barcodeId}"></svg>
          <div class="l-terminal">${carrier === 'CJ대한통운' ? 'CJ' : (carrier || '-').slice(0,2)}</div>
        </div>

        <div class="l-row l-to">
          <div class="l-tag">받는분</div>
          <div class="l-to-main">
            <div class="l-to-name">${order['구매자명'] || '-'}</div>
            <div class="l-to-sub">${maskPhone(order['구매자연락처'])}</div>
            <div class="l-to-addr">${order['구매자주소'] || '-'}</div>
          </div>
          <div class="l-to-barcode"><svg id="${barcodeIdSmall}"></svg></div>
        </div>

        <div class="l-row l-from">
          <div class="l-from-top">
            <span><span class="l-from-name">${store.name || '(내정보에서 출고지 정보를 설정해주세요)'}</span> <span class="l-from-phone">${store.phone || ''}</span></span>
            <span class="l-tags"><span class="l-chip">수량 ${order['수량'] || 0}</span><span class="l-chip">운임 0</span><span class="l-chip">신용</span></span>
          </div>
          <div class="l-from-addr">${store.address || ''}</div>
          <div class="l-from-receiver-echo">받는분: ${order['구매자명'] || '-'} / ${maskPhone(order['구매자연락처'])}</div>
        </div>

        <div class="l-row l-product">${productLine}</div>

        <div class="l-perf"></div>

        <div class="l-row l-stub">
          <div class="l-stub-name">${order['구매자명'] || '-'}</div>
          <svg id="${barcodeIdStub}"></svg>
          <div class="l-stub-page">(1/1)</div>
        </div>
        <div class="l-row l-stub2">
          <span>총수량: ${order['수량'] || 0} · 운임 0 · 신용</span>
          <span class="num">${trackingNo || '-'}</span>
        </div>
      </div>
    `;
  }

  function drawBarcodes(orders) {
    orders.forEach((o, idx) => {
      const trackingNo = String(o['송장_송장번호'] || '');
      if (!trackingNo) return;
      [['barcode_', 1.5, 44], ['barcode_small_', 1.1, 28], ['barcode_stub_', 1.3, 26]].forEach(([prefix, width, height]) => {
        try {
          JsBarcode('#' + prefix + idx, trackingNo, {
            format: 'CODE128', width, height, displayValue: false, margin: 0
          });
        } catch (e) { /* 바코드로 표현 불가한 값이면 조용히 스킵 */ }
      });
    });
  }

  async function render() {
    const singleId = getParam('orderId');
    const multiIds = getParam('orderIds');
    const contentEl = document.getElementById('content');

    const orderIds = multiIds ? multiIds.split(',').filter(Boolean) : (singleId ? [singleId] : []);
    if (!orderIds.length) { contentEl.innerHTML = '<div class="error-box">주문 정보가 없어요</div>'; return; }

    try {
      const store = await callApi('getStoreInfo', {});
      const orders = await Promise.all(orderIds.map(id => callApi('getOrderDetail', { orderId: id })));
      const validOrders = orders.filter(o => !o.error);

      if (!validOrders.length) throw new Error('출력할 주문 정보를 찾을 수 없어요');

      // 상품명 기준 정렬 (같은 상품끼리 모아서 포장하기 편하게)
      validOrders.sort((a, b) => String(a['상품명'] || '').localeCompare(String(b['상품명'] || ''), 'ko'));

      contentEl.className = '';
      const batchNote = validOrders.length > 1
        ? `<div class="batch-note">총 ${validOrders.length}건 · 상품명순 정렬됨</div>` : '';

      contentEl.innerHTML = batchNote + validOrders.map((o, i) => renderLabel(o, store, i)).join('');

      drawBarcodes(validOrders);
    } catch (e) {
      contentEl.className = 'error-box';
      contentEl.innerHTML = '불러오기 실패: ' + e.message;
    }
  }

  render();
</script>
</body>
</html>
