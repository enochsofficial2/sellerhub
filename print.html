<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송장 출력 - 셀러허브</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  :root{ --navy:#0F1B2E; --ink:#12192B; --ink-mute:#5C6478; --line:#9AA3AF; --amber:#E8A33D; --accent:#1B5FAE; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Pretendard', sans-serif; background:#EEF1F5; color:var(--ink); padding:16px;}
  .toolbar{max-width:420px; margin:0 auto 14px; display:flex; gap:8px;}
  .toolbar button{flex:1; border:0; border-radius:10px; padding:12px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;}
  .btn-print{background:var(--navy); color:#fff;}
  .btn-back{background:#fff; color:var(--ink); border:1px solid #DCE1E9 !important;}
  .batch-note{max-width:420px; margin:0 auto 14px; font-size:12px; color:var(--ink-mute); text-align:center;}

  /* ===== 택배 송장 스타일 라벨 ===== */
  .label{max-width:420px; margin:0 auto; background:#fff; border:2px solid var(--ink); font-size:12px;}
  .label-topbar{display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:2px solid var(--ink); background:#F4F6F8;}
  .label-brand{font-size:12px; font-weight:800; letter-spacing:0.03em;}
  .label-carrier{font-size:12px; font-weight:800; color:var(--accent);}

  .barcode-zone{padding:12px; text-align:center; border-bottom:2px solid var(--ink);}
  .barcode-zone svg{max-width:100%; height:52px;}
  .barcode-number{font-family:'IBM Plex Mono', monospace; font-size:15px; font-weight:700; letter-spacing:0.05em; margin-top:2px;}
  .barcode-caption{font-size:9.5px; color:var(--ink-mute); margin-top:2px;}
  .barcode-caption.temp{color:#B45309; font-weight:700;}

  .addr-row{display:flex; border-bottom:1px solid var(--line);}
  .addr-cell{flex:1; padding:10px 12px;}
  .addr-cell + .addr-cell{border-left:1px solid var(--line);}
  .addr-label{font-size:9.5px; color:#fff; background:var(--ink); display:inline-block; padding:1.5px 7px; border-radius:3px; font-weight:700; margin-bottom:5px;}
  .addr-name{font-size:14.5px; font-weight:800;}
  .addr-detail{font-size:11.5px; color:var(--ink); margin-top:2px; line-height:1.5;}

  .product-row{padding:10px 12px; border-bottom:1px solid var(--line);}
  .product-row .addr-label{background:var(--accent);}
  .product-name{font-size:13px; font-weight:700; margin-top:5px;}
  .product-meta{font-size:11px; color:var(--ink-mute); margin-top:2px;}

  .perforation{position:relative; height:0; border-top:2px dashed #B0B6BE; margin:0;}
  .perforation::before{content:"✂ 절취선"; position:absolute; left:50%; top:-8px; transform:translateX(-50%);
    background:#EEF1F5; font-size:9px; color:var(--ink-mute); padding:0 6px;}

  .stub{padding:10px 12px; display:flex; justify-content:space-between; align-items:center;}
  .stub-label{font-size:10.5px; color:var(--ink-mute);}
  .stub-value{font-size:12px; font-weight:700;}

  .loading, .error-box{max-width:420px; margin:40px auto; text-align:center; color:var(--ink-mute); font-size:13px;}

  @media print {
    body{background:#fff; padding:0;}
    .toolbar, .batch-note{display:none;}
    .label{border:1.5px solid #000; page-break-inside:avoid; margin-bottom:0;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn-back" onclick="window.close ? window.close() : history.back()">닫기</button>
  <button class="btn-print" onclick="window.print()">🖨 인쇄하기</button>
</div>

<div id="content" class="loading">불러오는 중...</div>

<script src="common.js"></script>
<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function renderLabel(order, store, idx) {
    const trackingNo = String(order['송장_송장번호'] || '');
    const isTemp = trackingNo.indexOf('999') === 0;
    const carrier = order['송장_택배사'] || '택배사 미지정';
    const barcodeId = 'barcode_' + idx;

    let productBlock = `<div class="product-name">${order['상품명'] || '-'} 외 ${order['수량'] || 0}개</div>`;
    if (order['품목목록JSON']) {
      try {
        const items = JSON.parse(order['품목목록JSON']);
        if (items.length > 1) {
          productBlock = items.map(it =>
            `<div class="product-name" style="font-size:12px;">${it.productName} × ${it.quantity}개</div>`
          ).join('');
        }
      } catch (e) {}
    }

    return `
      <div class="label">
        <div class="label-topbar">
          <div class="label-brand">SELLER HUB 통합 송장</div>
          <div class="label-carrier">${carrier}</div>
        </div>

        <div class="barcode-zone">
          <svg id="${barcodeId}"></svg>
          <div class="barcode-number">${trackingNo || '-'}</div>
          ${isTemp ? '<div class="barcode-caption temp">⚠ 임시번호 (실제 접수 시 택배사 번호로 교체 필요)</div>' : '<div class="barcode-caption">운송장번호</div>'}
        </div>

        <div class="addr-row">
          <div class="addr-cell">
            <span class="addr-label">받는분</span>
            <div class="addr-name">${order['구매자명'] || '-'}</div>
            <div class="addr-detail">${order['구매자연락처'] || '-'}</div>
            <div class="addr-detail">${order['구매자주소'] || '-'}</div>
          </div>
          <div class="addr-cell">
            <span class="addr-label">보내는분</span>
            <div class="addr-name">${store.name || '(미설정)'}</div>
            <div class="addr-detail">${store.phone || ''}</div>
            <div class="addr-detail">${store.address || ''}</div>
          </div>
        </div>

        <div class="product-row">
          <span class="addr-label">상품정보</span>
          ${productBlock}
          <div class="product-meta">채널: ${order['판매채널'] || '기타'} · 주문번호 ${order['채널주문번호'] || '-'}</div>
        </div>

        <div class="perforation"></div>

        <div class="stub">
          <div class="stub-label">수령인 확인용 (Copy)</div>
          <div class="stub-value">${trackingNo || '-'}</div>
        </div>
      </div>
    `;
  }

  function drawBarcodes(orders) {
    orders.forEach((o, idx) => {
      const trackingNo = String(o['송장_송장번호'] || '');
      if (!trackingNo) return;
      try {
        JsBarcode('#barcode_' + idx, trackingNo, {
          format: 'CODE128', width: 1.6, height: 45, displayValue: false, margin: 0
        });
      } catch (e) { /* 바코드로 표현 불가한 값이면 조용히 스킵 */ }
    });
  }

  async function render() {
    const singleId = getParam('orderId');
    const multiIds = getParam('orderIds');
    const contentEl = document.getElementById('content');

    const orderIds = multiIds ? multiIds.split(',').filter(Boolean) : (singleId ? [singleId] : []);
    if (!orderIds.length) { contentEl.innerHTML = '<div class="error-box">주문 정보가 없어요</div>'; return; }

    try {
      const store = await callApi('getStoreInfo', {});
      const orders = await Promise.all(orderIds.map(id => callApi('getOrderDetail', { orderId: id })));
      const validOrders = orders.filter(o => !o.error);

      if (!validOrders.length) throw new Error('출력할 주문 정보를 찾을 수 없어요');

      // 상품명 기준 정렬 (같은 상품끼리 모아서 포장하기 편하게)
      validOrders.sort((a, b) => String(a['상품명'] || '').localeCompare(String(b['상품명'] || ''), 'ko'));

      contentEl.className = '';
      const batchNote = validOrders.length > 1
        ? `<div class="batch-note">총 ${validOrders.length}건 · 상품명순 정렬됨</div>` : '';

      contentEl.innerHTML = batchNote + validOrders.map((o, i) => renderLabel(o, store, i))
        .join('<div style="height:14px;"></div>');

      drawBarcodes(validOrders);
    } catch (e) {
      contentEl.className = 'error-box';
      contentEl.innerHTML = '불러오기 실패: ' + e.message;
    }
  }

  render();
</script>
</body>
</html>
