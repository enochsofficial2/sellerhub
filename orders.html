<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>주문관리 - 셀러허브</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .filter-tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px;}
  .filter-tabs::-webkit-scrollbar{display:none;}
  .filter-tabs button{border:0; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.65); font-size:13px; font-weight:600;
    padding:7px 14px; border-radius:999px; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0;}
  .filter-tabs button.active{background:var(--amber); color:var(--navy);}

  .order-card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:10px; cursor:pointer;}
  .order-top{display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .order-date{font-size:11px; color:var(--ink-mute); margin-left:auto;}
  .order-product{font-size:15px; font-weight:700; margin-bottom:4px;}
  .order-meta{font-size:12px; color:var(--ink-mute); display:flex; gap:10px; flex-wrap:wrap;}
  .order-meta b{color:var(--ink); font-weight:600;}
  .order-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .order-amount{font-size:15px; font-weight:700;}
  .order-staff{font-size:12px; color:var(--ink-mute);}
  .quick-ship-btn{background:var(--navy); color:#fff; border:0; border-radius:8px; padding:8px 14px; font-size:12px;
    font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap;}
  .quick-ship-btn:active{opacity:0.85;}

  .active-filter-banner{background:var(--amber-soft); color:#8a5c14; font-size:12px; font-weight:600;
    padding:9px 14px; border-radius:10px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;}
  .active-filter-banner button{border:0; background:none; color:#8a5c14; font-size:12px; text-decoration:underline; font-family:inherit; cursor:pointer;}

  .fab{position:fixed; right:calc(16px + max(0px, (100vw - 520px)/2)); bottom:calc(150px + env(safe-area-inset-bottom));
    width:52px; height:52px; border-radius:50%; background:var(--navy); color:#fff; border:0; box-shadow:0 6px 16px rgba(15,27,46,0.35);
    display:flex; align-items:center; justify-content:center; z-index:55;}

  .refresh-btn{position:fixed; right:calc(16px + max(0px, (100vw - 520px)/2)); bottom:calc(88px + env(safe-area-inset-bottom));
    width:46px; height:46px; border-radius:50%; background:var(--navy); color:#fff; border:0; box-shadow:0 4px 14px rgba(15,27,46,0.3);
    display:flex; align-items:center; justify-content:center; font-size:18px; z-index:55;}
  .refresh-btn.spinning svg{animation: spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .detail-row{display:flex; justify-content:space-between; font-size:13px; padding:9px 0; border-bottom:1px solid var(--bg);}
  .detail-row span:first-child{color:var(--ink-mute);}
  .detail-row span:last-child{font-weight:600; text-align:right; max-width:60%;}

  @media (min-width: 900px) {
    #orderList{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:10px; align-items:start;}
    #orderList .order-card{margin-bottom:0;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand"><span class="dot"></span>SELLER HUB</div>
    <h1 class="page-title">주문관리</h1>
    <div class="filter-tabs" id="filterTabs">
      <button data-status="" class="active">전체</button>
      <button data-status="신규">신규</button>
      <button data-status="발송완료">발송완료</button>
      <button data-status="반품접수">반품접수</button>
      <button data-status="반품완료">반품완료</button>
      <button data-status="취소">취소</button>
    </div>
  </header>

  <main>
    <div id="orderList"><div class="skeleton" style="height:96px; margin-bottom:10px;"></div><div class="skeleton" style="height:96px;"></div></div>
  </main>

  <button class="fab" id="addOrderBtn" aria-label="주문 직접 등록">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <button class="refresh-btn" id="refreshBtn" aria-label="새로고침">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
    </svg>
  </button>

  <div class="toast" id="toast"></div>

  <nav class="bottom">
    <div class="bottom-inner">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a href="orders.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
        주문
      </a>
      <a href="inventory.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>
        재고
      </a>
            <a href="insights.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        종합
      </a>
      <a href="profile.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>
        내정보
      </a>
    </div>
  </nav>

</div>

<!-- 주문 상세 + 액션 바텀시트 -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <h2 id="detailProduct">-</h2>
  <div class="sheet-sub" id="detailSub">-</div>
  <div id="detailBody"></div>
  <div id="detailActions"></div>
</div>

<!-- 송장 등록 폼 바텀시트 -->
<div class="sheet-overlay" id="shipOverlay"></div>
<div class="sheet" id="shipSheet">
  <div class="sheet-handle"></div>
  <h2>송장 등록</h2>
  <div class="sheet-sub">등록하면 재고가 자동으로 차감돼요</div>
  <div class="field">
    <label>택배사</label>
    <select id="shipCarrier">
      <option>CJ대한통운</option><option>롯데택배</option><option>한진택배</option>
      <option>로젠택배</option><option>우체국택배</option><option>기타</option>
    </select>
  </div>
  <div class="field">
    <label>송장번호</label>
    <input type="text" id="shipTrackingNo" placeholder="송장번호 입력">
  </div>
  <div class="field">
    <label>담당자</label>
    <input type="text" id="shipStaff" list="staffList" placeholder="처리한 사람 이름">
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="shipCancel">취소</button>
    <button class="btn btn-primary" id="shipSubmit">등록 완료</button>
  </div>
</div>

<!-- 반품 접수 폼 바텀시트 -->
<div class="sheet-overlay" id="returnOverlay"></div>
<div class="sheet" id="returnSheet">
  <div class="sheet-handle"></div>
  <h2>반품 접수</h2>
  <div class="sheet-sub">접수 후 반품 탭에서 진행상황을 관리할 수 있어요</div>
  <div class="field">
    <label>반품 사유</label>
    <textarea id="returnReason" placeholder="예: 단순 변심, 상품 불량 등"></textarea>
  </div>
  <div class="field">
    <label>담당자</label>
    <input type="text" id="returnStaff" list="staffList" placeholder="처리한 사람 이름">
  </div>
  <datalist id="staffList"></datalist>
  <div class="btn-row">
    <button class="btn btn-ghost" id="returnCancel">취소</button>
    <button class="btn btn-danger" id="returnSubmit">반품 접수</button>
  </div>
</div>

<!-- 주문 직접 등록 바텀시트 -->
<div class="sheet-overlay" id="addOrderOverlay"></div>
<div class="sheet" id="addOrderSheet">
  <div class="sheet-handle"></div>
  <h2>주문 직접 등록</h2>
  <div class="sheet-sub">전화주문, 직접판매 등록, 또는 API 연동 전 테스트용이에요</div>
  <div class="field">
    <label>판매채널</label>
    <select id="oChannel">
      <option>직접판매</option><option>쿠팡</option><option>네이버</option><option>기타</option>
    </select>
  </div>
  <div class="field">
    <label>상품 *</label>
    <select id="oProduct"><option value="">상품을 먼저 재고관리에서 등록해주세요</option></select>
  </div>
  <div class="field"><label>수량 *</label><input type="number" id="oQty" value="1" min="1"></div>
  <div class="field"><label>판매가 (비우면 상품 기본가 적용)</label><input type="number" id="oPrice" placeholder="원"></div>
  <div class="field"><label>구매자명</label><input type="text" id="oBuyerName" placeholder="선택사항"></div>
  <div class="field"><label>연락처</label><input type="text" id="oBuyerPhone" placeholder="선택사항"></div>
  <div class="field"><label>주소</label><input type="text" id="oBuyerAddress" placeholder="선택사항"></div>
  <div class="field"><label>담당자</label><input type="text" id="oStaff" list="staffList" placeholder="이름 입력"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="addOrderCancel">취소</button>
    <button class="btn btn-primary" id="addOrderSubmit">등록</button>
  </div>
</div>

<!-- 취소 처리 폼 바텀시트 -->
<div class="sheet-overlay" id="cancelOverlay"></div>
<div class="sheet" id="cancelSheet">
  <div class="sheet-handle"></div>
  <h2>취소 처리</h2>
  <div class="sheet-sub">발송 전 주문 취소예요. 재고는 아직 차감 전이라 복원할 필요 없어요</div>
  <div class="field">
    <label>취소 사유</label>
    <textarea id="cancelReason" placeholder="예: 고객 단순변심, 품절 등"></textarea>
  </div>
  <div class="field">
    <label>담당자</label>
    <input type="text" id="cancelStaff" list="staffList" placeholder="처리한 사람 이름">
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="cancelCancel">취소</button>
    <button class="btn btn-danger" id="cancelSubmit">취소 확정</button>
  </div>
</div>

<script src="common.js"></script>
<script>
  let currentStatus = '';
  let currentOrders = [];
  let activeOrderId = null;

  async function loadOrders(status) {
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');
    const listEl = document.getElementById('orderList');
    try {
      const data = await callApi('listOrders', status ? { status } : {});
      if (data.error) throw new Error(data.error);
      currentOrders = data || [];

      if (!currentOrders.length) {
        listEl.innerHTML = `<div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l1.5-5h15L21 9"/><rect x="3" y="9" width="18" height="11" rx="1.5"/><path d="M9 13a3 3 0 0 0 6 0"/></svg>
          <b>주문이 없어요</b>${status ? '이 상태의 주문이 아직 없어요' : '채널 연동이 완료되면 여기 자동으로 쌓여요'}
        </div>`;
        return;
      }

      listEl.innerHTML = currentOrders.map(o => {
        const d = o['주문일시'] ? new Date(o['주문일시']) : null;
        const dateStr = d ? (d.getMonth()+1) + '.' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') : '';
        return `<div class="order-card" data-order-id="${o['주문ID']}">
          <div class="order-top">
            <span class="${channelBadgeClass(o['판매채널'])}">${o['판매채널'] || '기타'}</span>
            <span class="${statusBadgeClass(o['주문상태'])}">${o['주문상태'] || '신규'}</span>
            <span class="order-date">${dateStr}</span>
          </div>
          <div class="order-product">${o['상품명'] || '-'}</div>
          <div class="order-meta">
            <span>수량 <b>${formatWon(o['수량'])}개</b></span>
            <span>구매자 <b>${o['구매자명'] || '-'}</b></span>
          </div>
          <div class="order-bottom">
            <span class="order-amount mono">${formatWon(o['판매가'])}원</span>
            ${o['주문상태'] === '신규'
              ? `<button class="quick-ship-btn" data-quick-ship="${o['주문ID']}">바로 송장등록</button>`
              : `<span class="order-staff">${o['담당자ID'] ? '담당 ' + o['담당자ID'] : '담당자 미지정'}</span>`}
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      showToast('불러오기 실패: ' + e.message);
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  // 필터 탭
  document.getElementById('filterTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-status]');
    if (!btn) return;
    document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadOrders(currentStatus);
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadOrders(currentStatus));

  document.querySelectorAll('[data-soon]').forEach(el => {
    el.addEventListener('click', () => showToast('다음 단계에서 만들 예정이에요'));
  });

  // 카드 탭 -> 상세 시트
  function openSheet(overlayId, sheetId) {
    document.getElementById(overlayId).classList.add('show');
    document.getElementById(sheetId).classList.add('show');
  }
  function closeSheet(overlayId, sheetId) {
    document.getElementById(overlayId).classList.remove('show');
    document.getElementById(sheetId).classList.remove('show');
  }

  document.getElementById('orderList').addEventListener('click', (e) => {
    // 빠른 송장등록 버튼을 눌렀으면 상세 팝업을 열지 않고 바로 송장 폼으로
    const quickBtn = e.target.closest('[data-quick-ship]');
    if (quickBtn) {
      activeOrderId = quickBtn.dataset.quickShip;
      openSheet('shipOverlay', 'shipSheet');
      return;
    }

    const card = e.target.closest('.order-card');
    if (!card) return;
    const orderId = card.dataset.orderId;
    const order = currentOrders.find(o => o['주문ID'] === orderId);
    if (!order) return;
    activeOrderId = orderId;
    showDetail(order);
  });

  // 대시보드에서 ?status=신규 같은 링크로 들어온 경우 자동으로 해당 탭 선택
  (function applyUrlFilter() {
    const params = new URLSearchParams(window.location.search);
    const statusParam = params.get('status');
    if (statusParam) {
      const btn = document.querySelector('#filterTabs button[data-status="' + statusParam + '"]');
      if (btn) {
        document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = statusParam;
      }
    }
  })();

  function showDetail(o) {
    document.getElementById('detailProduct').textContent = o['상품명'] || '-';
    document.getElementById('detailSub').innerHTML =
      `<span class="${channelBadgeClass(o['판매채널'])}">${o['판매채널']||'기타'}</span> · 주문번호 ${o['채널주문번호']||'-'}`;

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-row"><span>구매자</span><span>${o['구매자명']||'-'}</span></div>
      <div class="detail-row"><span>연락처</span><span>${o['구매자연락처']||'-'}</span></div>
      <div class="detail-row"><span>배송지</span><span>${o['구매자주소']||'-'}</span></div>
      <div class="detail-row"><span>수량 / 금액</span><span>${formatWon(o['수량'])}개 · ${formatWon(o['판매가'])}원</span></div>
      <div class="detail-row"><span>현재 상태</span><span>${o['주문상태']||'신규'}</span></div>
      <div class="detail-row"><span>담당자</span><span>${o['담당자ID']||'미지정'}</span></div>
    `;

    const actions = document.getElementById('detailActions');
    let actionHtml = '<div class="btn-row" style="margin-top:16px;">';
    if (o['주문상태'] === '신규') {
      actionHtml += `<button class="btn btn-primary" id="btnGoShip">송장 등록</button>`;
    }
    if (o['주문상태'] === '발송완료') {
      actionHtml += `<button class="btn btn-ghost" id="btnPrintLabel">송장 출력</button>`;
    }
    if (o['주문상태'] === '신규') {
      actionHtml += `<button class="btn btn-danger" id="btnGoCancel">취소 처리</button>`;
    }
    if (o['주문상태'] === '발송완료') {
      actionHtml += `<button class="btn btn-danger" id="btnGoReturn">반품 접수</button>`;
    }
    if (o['주문상태'] === '반품접수') {
      actionHtml += `<button class="btn btn-primary" id="btnCompleteReturn">반품완료 처리(재입고)</button>`;
    }
    actionHtml += '</div>';
    actions.innerHTML = actionHtml;

    const printBtn = document.getElementById('btnPrintLabel');
    if (printBtn) printBtn.addEventListener('click', () => {
      window.open('print.html?orderId=' + encodeURIComponent(o['주문ID']), '_blank');
    });

    const cancelBtn = document.getElementById('btnGoCancel');
    if (cancelBtn) cancelBtn.addEventListener('click', () => {
      closeSheet('sheetOverlay', 'detailSheet');
      setTimeout(() => openSheet('cancelOverlay', 'cancelSheet'), 200);
    });

    const completeReturnBtn = document.getElementById('btnCompleteReturn');
    if (completeReturnBtn) completeReturnBtn.addEventListener('click', async () => {
      completeReturnBtn.disabled = true;
      try {
        const res = await callApi('completeReturn', { orderId: activeOrderId, staffId: document.getElementById('returnStaff').value.trim() || '미지정' });
        if (res.error) throw new Error(res.error);
        showToast('반품완료 처리됐어요 - 재고가 복원됐어요');
        closeSheet('sheetOverlay', 'detailSheet');
        loadOrders(currentStatus);
      } catch (e) {
        showToast('처리 실패: ' + e.message);
      } finally {
        completeReturnBtn.disabled = false;
      }
    });

    const goShip = document.getElementById('btnGoShip');
    if (goShip) goShip.addEventListener('click', () => {
      closeSheet('sheetOverlay', 'detailSheet');
      setTimeout(() => openSheet('shipOverlay', 'shipSheet'), 200);
    });
    const goReturn = document.getElementById('btnGoReturn');
    if (goReturn) goReturn.addEventListener('click', () => {
      closeSheet('sheetOverlay', 'detailSheet');
      setTimeout(() => openSheet('returnOverlay', 'returnSheet'), 200);
    });

    openSheet('sheetOverlay', 'detailSheet');
  }

  document.getElementById('sheetOverlay').addEventListener('click', () => closeSheet('sheetOverlay', 'detailSheet'));

  // 송장 등록
  document.getElementById('shipOverlay').addEventListener('click', () => closeSheet('shipOverlay', 'shipSheet'));
  document.getElementById('shipCancel').addEventListener('click', () => closeSheet('shipOverlay', 'shipSheet'));
  document.getElementById('shipSubmit').addEventListener('click', async () => {
    const carrier = document.getElementById('shipCarrier').value;
    const trackingNo = document.getElementById('shipTrackingNo').value.trim();
    const staff = document.getElementById('shipStaff').value.trim();
    if (!trackingNo) { showToast('송장번호를 입력해주세요'); return; }
    if (!staff) { showToast('담당자를 입력해주세요'); return; }

    const btn = document.getElementById('shipSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('createShipment', { orderId: activeOrderId, carrier, trackingNo, staffId: staff });
      if (res.error) throw new Error(res.error);

      if (res.channelSync && res.channelSync.attempted) {
        if (res.channelSync.success) {
          showToast('송장 등록 + 채널로 자동 전송 완료');
        } else {
          showToast('송장은 등록됐지만 채널 전송 실패: ' + (res.channelSync.error || '') + ' — 직접 사이트에서도 입력해주세요');
        }
      } else {
        showToast('송장 등록 완료 - 재고가 자동 차감됐어요');
      }
      closeSheet('shipOverlay', 'shipSheet');
      document.getElementById('shipTrackingNo').value = '';
      document.getElementById('shipStaff').value = '';
      loadOrders(currentStatus);
    } catch (e) {
      showToast('처리 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  // 반품 접수
  document.getElementById('returnOverlay').addEventListener('click', () => closeSheet('returnOverlay', 'returnSheet'));
  document.getElementById('returnCancel').addEventListener('click', () => closeSheet('returnOverlay', 'returnSheet'));
  document.getElementById('returnSubmit').addEventListener('click', async () => {
    const reason = document.getElementById('returnReason').value.trim();
    const staff = document.getElementById('returnStaff').value.trim();
    if (!reason) { showToast('반품 사유를 입력해주세요'); return; }
    if (!staff) { showToast('담당자를 입력해주세요'); return; }

    const btn = document.getElementById('returnSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('receiveReturn', { orderId: activeOrderId, reason, staffId: staff });
      if (res.error) throw new Error(res.error);
      showToast('반품 접수 완료');
      closeSheet('returnOverlay', 'returnSheet');
      document.getElementById('returnReason').value = '';
      document.getElementById('returnStaff').value = '';
      loadOrders(currentStatus);
    } catch (e) {
      showToast('처리 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  // 취소 처리
  document.getElementById('cancelOverlay').addEventListener('click', () => closeSheet('cancelOverlay', 'cancelSheet'));
  document.getElementById('cancelCancel').addEventListener('click', () => closeSheet('cancelOverlay', 'cancelSheet'));
  document.getElementById('cancelSubmit').addEventListener('click', async () => {
    const reason = document.getElementById('cancelReason').value.trim();
    const staff = document.getElementById('cancelStaff').value.trim();
    if (!reason) { showToast('취소 사유를 입력해주세요'); return; }
    if (!staff) { showToast('담당자를 입력해주세요'); return; }

    const btn = document.getElementById('cancelSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('cancelOrder', { orderId: activeOrderId, reason, staffId: staff });
      if (res.error) throw new Error(res.error);
      showToast('취소 처리됐어요');
      closeSheet('cancelOverlay', 'cancelSheet');
      document.getElementById('cancelReason').value = '';
      document.getElementById('cancelStaff').value = '';
      loadOrders(currentStatus);
    } catch (e) {
      showToast('처리 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  loadOrders(currentStatus);

  (async function loadStaffSuggestions() {
    try {
      const staff = await callApi('listStaff', {});
      if (staff.error) return;
      document.getElementById('staffList').innerHTML = staff.map(s => `<option value="${s['이름']}">`).join('');
    } catch (e) {}
  })();

  let allProductsForOrder = [];
  async function loadProductsForOrderForm() {
    try {
      const products = await callApi('listProducts', {});
      if (products.error) return;
      allProductsForOrder = products;
      const sel = document.getElementById('oProduct');
      if (!products.length) {
        sel.innerHTML = '<option value="">상품을 먼저 재고관리에서 등록해주세요</option>';
        return;
      }
      sel.innerHTML = products.map(p => `<option value="${p['상품ID']}">${p['상품명']} (재고 ${p['현재재고']})</option>`).join('');
    } catch (e) {}
  }

  document.getElementById('addOrderBtn').addEventListener('click', () => {
    loadProductsForOrderForm();
    openSheet('addOrderOverlay', 'addOrderSheet');
  });
  document.getElementById('addOrderCancel').addEventListener('click', () => closeSheet('addOrderOverlay', 'addOrderSheet'));
  document.getElementById('addOrderOverlay').addEventListener('click', () => closeSheet('addOrderOverlay', 'addOrderSheet'));

  document.getElementById('addOrderSubmit').addEventListener('click', async () => {
    const productId = document.getElementById('oProduct').value;
    const qty = document.getElementById('oQty').value;
    const staff = document.getElementById('oStaff').value.trim();
    if (!productId) { showToast('상품을 선택해주세요'); return; }
    if (!qty || Number(qty) < 1) { showToast('수량을 확인해주세요'); return; }
    if (!staff) { showToast('담당자를 입력해주세요'); return; }

    const btn = document.getElementById('addOrderSubmit');
    btn.disabled = true;
    try {
      const res = await callApi('createOrderManual', {
        channel: document.getElementById('oChannel').value,
        productId, quantity: qty,
        price: document.getElementById('oPrice').value,
        buyerName: document.getElementById('oBuyerName').value.trim(),
        buyerPhone: document.getElementById('oBuyerPhone').value.trim(),
        buyerAddress: document.getElementById('oBuyerAddress').value.trim(),
        staffId: staff
      });
      if (res.error) throw new Error(res.error);
      showToast('주문이 등록됐어요');
      closeSheet('addOrderOverlay', 'addOrderSheet');
      ['oBuyerName', 'oBuyerPhone', 'oBuyerAddress', 'oPrice'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('oQty').value = 1;
      loadOrders(currentStatus);
    } catch (e) {
      showToast('등록 실패: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
